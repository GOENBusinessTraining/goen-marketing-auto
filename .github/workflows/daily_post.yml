name: GOEN Daily Article Post

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日朝10時（ベトナム時間 UTC+7）
  workflow_dispatch:       # 手動実行も可能

jobs:
  generate-and-post:
    runs-on: ubuntu-latest

    # --- 【ここが変更点】全員が見える場所にURLやパスワードを引っ越しました ---
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
      CF_SECRET_KEY: ${{ secrets.CF_SECRET_KEY }}
    # -------------------------------------------------------------------

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なライブラリをインストール
        run: pip install anthropic requests

      - name: 記事を生成してWordPressに投稿
        run: python post_to_wordpress.py
